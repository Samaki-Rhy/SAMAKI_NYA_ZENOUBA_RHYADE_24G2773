<!DOCTYPE html>
<html>
<head>
    <title>RSafeTrack</title>
    <style>
    Body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; max-width: 800px; margin: auto ; padding : 20px ; }
    H1 { color: #2c3e50; text-align: center; }
    Form { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    Input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
    Button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
    Button:hover { background-color: #2980b9; }
</style>


</head>
<body>
      <nav style="background: #333; padding: 10px; margin-bottom: 20px;">
    <a href="/" style="color: white; margin-right: 20px; text-decoration: none;">➕ Ajouter une dépense</a>
    <a href="/dashboard" style="color: white; text-decoration: none;">📊 Voir le Dashboard</a>
</nav>
<div style="text-align: center; margin-bottom: 40px;">
    <h1 style="color: #2c3e50; font-size: 2.5em; margin-bottom: 10px;">Bienvenue sur RSafeTrack</h1>
    <p style="color: #7f8c8d; font-style: italic;">Votre compagnon intelligent pour gérer vos finances</p>
</div>
<div style="background: #e8f4fd; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #3498db;">
    <h3 style="margin-top:0; color: #2980b9;">💰 Mon Budget Total</h3>
    <form action="/set_budget" method="POST" style="display": flex; gap: 10px; background: none; box-shadow: none; padding: 0;>
        <input type="number" name="budget" placeholder="Somme initiale (ex: 5000)" style="flex : 2; margin: 0;">
        <button type="submit" style="flex: 1; margin: 0; background-color: #27ae60;">Fixer le Budget</button>
    </form>
</div>


<h2>Ajouter une dépense</h2>

<form action="/"method="POST">
   <label>Montant:</label><br>
    <input type="number" name="montant" placeholder="Montant" required><br><br>

    <label>Catégorie:</label><br>
    <select name="categorie" required style="width: 100%; padding: 10px;">
        <option value="Ration">🍎 Ration</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Loisirs">🎮 Loisirs</option>
        <option value="Santé">🏥 Santé</option>
        <option value="Autre">✨ Autre</option>
    </select><br><br>

    <label>Date:</label><br>
    <input type="date" name="date" required><br><br>

    <label>Description:</label><br>
    <input type="text" name="description" placeholder="Ex: Courses au marché"><br><br>

    <button type="submit">Ajouter la dépense</button>
</form>

<br>
<a href="/dashboard">Voir Dashboard</a>

</body>
</html>
